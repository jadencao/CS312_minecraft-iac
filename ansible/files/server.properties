# ----------------------------------------------------------------------------
# server.properties — Initial Minecraft server settings, seeded once by
# Ansible (force: false). On first boot the server fills in every other
# setting with its defaults and takes ownership of this file.
# ----------------------------------------------------------------------------

# The TCP port the server listens on — must match the security group rule.
server-port=25565
# Enable the query protocol so tools like nmap can read server info.
enable-query=true
query.port=25565
# Message shown in the multiplayer server list (and in nmap -sV output!).
motd=Acme Corp Minecraft Server (Provisioned by IaC)
max-players=20